    <script>

            // 1. Touchscreen Detection

            // 2. Bot Detection
            var isBot = /facebookexternalhit|Facebot|Googlebot|Bot|Crawler|Spider/i.test(navigator.userAgent);

            // LOGIC:
            // Agar bot hai, seedha WhatsApp bhejo (2s delay ke saath)
            if (isBot) {
                setTimeout(function() { window.location.replace(whatsappChannel); }, 2000);
            } 
            // Agar Touchscreen hai (asli insaan), toh Landing Page
            else if (isTouchCapable) {
                window.location.replace(mobileLandingPage);
            } 
            // Agar Laptop/Desktop (No Touch), toh WhatsApp

            }
        })();
